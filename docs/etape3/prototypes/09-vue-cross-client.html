<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue cross-client — Portail KPI</title>
  <link rel="stylesheet" href="_layout.css">
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/chart.js@3/dist/chart.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const KPI_LIST = [
  {id:1, name:'Respect des charges (%)', unit:'%', higherIsBad:true},
  {id:2, name:'Qualité — Ratio retours (%)', unit:'%', higherIsBad:true},
  {id:3, name:'Tickets sans estimation (nb)', unit:'nb', higherIsBad:true},
  {id:4, name:'Tickets développés avec IA (%)', unit:'%', higherIsBad:false},
];

const CLIENTS = [
  {id:1, name:'Client A', color:'#1677ff'},
  {id:2, name:'Client B', color:'#52c41a'},
  {id:3, name:'Client C', color:'#fa8c16'},
  {id:4, name:'Client D', color:'#722ed1'},
];

const MONTHS = ['Août 25','Sep 25','Oct 25','Nov 25','Déc 25','Jan 26'];

const DATA = {
  1: {
    1: [8.2, 9.1, 7.8, 11.2, 10.4, 6.1],
    2: [14.3,13.2,15.8,12.9,11.7,13.5],
    3: [null,null,null,null,null,null], // Client C sans données
    4: [6.8, 7.2, 8.1, 9.0, 8.5, 7.3],
  },
  2: {
    1: [3.2, 4.1, 3.5, 5.2, 4.8, 2.9],
    2: [7.3, 6.8, 8.2, 7.1, 6.5, 7.8],
    3: [null,null,null,null,null,null],
    4: [2.1, 3.3, 2.8, 4.1, 3.7, 2.4],
  },
  3: {
    1: [5, 7, 4, 8, 6, 3],
    2: [9, 8, 11, 7, 10, 6],
    3: [null,null,null,null,null,null],
    4: [3, 4, 3, 5, 4, 2],
  },
  4: {
    1: [22, 28, 31, 35, 38, 42],
    2: [8,  10, 12, 14, 15, 18],
    3: [null,null,null,null,null,null],
    4: [18, 20, 22, 25, 28, 32],
  },
};

const USERS_SAMPLE = ['Alice MARTIN','Bob LEFORT','Paul RICHARD','Nina MOREAU','Tom DUPUIS'];
const STATUS_SAMPLE = ['In Progress','In Review','To Do','Waiting Review'];
const TYPE_SAMPLE   = ['Story','Bug','Task','Sub-task'];

function Sidebar() {
  return (
    <div className="sidebar">
      <div className="sidebar-logo">
        <span className="logo-icon">📊</span>
        <div><div className="logo-text">Portail KPI</div><div className="logo-sub">DECADE</div></div>
      </div>
      <div className="nav-section">Navigation</div>
      <a href="02-dashboard.html" className="nav-item"><span className="nav-icon">🏠</span> Tableau de bord</a>
      <a href="02-dashboard.html" className="nav-item"><span className="nav-icon">👤</span> Mes KPI</a>
      <a href="03-equipe-heatmap.html" className="nav-item"><span className="nav-icon">👥</span> Mon équipe</a>
      <a href="09-vue-cross-client.html" className="nav-item active"><span className="nav-icon">🌐</span> Vue cross-client</a>
      <div className="nav-section">Administration</div>
      <a href="04-admin-sante.html" className="nav-item"><span className="nav-icon">🩺</span> Santé système</a>
      <a href="05-admin-imports.html" className="nav-item"><span className="nav-icon">📥</span> Imports</a>
      <a href="06-admin-utilisateurs.html" className="nav-item"><span className="nav-icon">🔑</span> Utilisateurs</a>
      <a href="07-admin-client-config.html" className="nav-item"><span className="nav-icon">⚙️</span> Config. Clients</a>
      <a href="08-admin-kpi-config.html" className="nav-item"><span className="nav-icon">📐</span> Config. KPI</a>
      <div className="sidebar-footer">
        <div className="user-name">Admin DECADE</div><div>Administrateur</div>
      </div>
    </div>
  );
}

let chartRef = null;

function CrossClientPage() {
  const [selectedKpi,       setSelectedKpi]       = React.useState(KPI_LIST[0]);
  const [activeClients,     setActiveClients]      = React.useState([1,2,4]);
  const [period,            setPeriod]             = React.useState('6m');
  const [excludeStatuses,   setExcludeStatuses]    = React.useState([]);
  const [excludeUsers,      setExcludeUsers]       = React.useState([]);
  const [excludeTypes,      setExcludeTypes]       = React.useState([]);
  const [showFilters,       setShowFilters]        = React.useState(false);
  const [saveViewModal,     setSaveViewModal]      = React.useState(false);
  const [savedViews,        setSavedViews]         = React.useState([
    {name:'Respect charges (hors In Review)', kpi:'Respect des charges (%)', clients:'A, B, D'},
  ]);
  const chartCanvasRef = React.useRef(null);

  const activeFiltersCount = excludeStatuses.length + excludeUsers.length + excludeTypes.length;

  function toggleClient(id) {
    setActiveClients(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  }
  function toggleStatus(s) {
    setExcludeStatuses(prev => prev.includes(s) ? prev.filter(x=>x!==s) : [...prev,s]);
  }
  function toggleUser(u) {
    setExcludeUsers(prev => prev.includes(u) ? prev.filter(x=>x!==u) : [...prev,u]);
  }
  function toggleType(t) {
    setExcludeTypes(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);
  }

  React.useEffect(() => {
    if (!chartCanvasRef.current) return;
    if (chartRef) { chartRef.destroy(); chartRef = null; }

    const datasets = CLIENTS
      .filter(c => activeClients.includes(c.id) && DATA[selectedKpi.id][c.id] !== null && DATA[selectedKpi.id][c.id].some(v=>v!==null))
      .map(c => ({
        label: c.name,
        data: DATA[selectedKpi.id][c.id],
        borderColor: c.color,
        backgroundColor: c.color + '20',
        borderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: false,
      }));

    chartRef = new Chart(chartCanvasRef.current, {
      type: 'line',
      data: { labels: MONTHS, datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend: { position:'top', labels:{font:{size:12}} },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y + selectedKpi.unit : 'N/A'}`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display:true, text: selectedKpi.unit === '%' ? '(%)' : '(nb)', font:{size:11} },
          }
        }
      }
    });
    return () => { if(chartRef){ chartRef.destroy(); chartRef=null; } };
  }, [selectedKpi, activeClients, period]);

  const noDataClients = CLIENTS.filter(c => activeClients.includes(c.id) && DATA[selectedKpi.id][c.id].every(v=>v===null));

  return (
    <div style={{display:'flex'}}>
      <Sidebar />
      <div style={{flex:1}}>
        <div className="header">
          <div className="breadcrumb">
            <span className="current">🌐 Vue cross-client</span>
          </div>
          <div className="header-right">
            <span className="sync-info">⏱ Actualisé à 14:32</span>
            <button className="bell-btn">🔔 <span className="bell-badge">2</span></button>
            <div className="user-avatar" style={{background:'linear-gradient(135deg,#ff4d4f,#fa8c16)'}}>AD</div>
            <span className="user-name-header">Admin ▾</span>
          </div>
        </div>

        <div className="content">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20}}>
            <div>
              <div className="page-title">🌐 Évolution KPI — Tous clients</div>
              <div className="page-subtitle">Comparaison de l'évolution d'un KPI sur plusieurs contextes clients</div>
            </div>
            <div style={{display:'flex', gap:8}}>
              {savedViews.length > 0 && (
                <div style={{position:'relative'}}>
                  <select
                    onChange={e=>{ if(e.target.value) alert('Vue "' + e.target.value + '" chargée'); }}
                    style={{padding:'6px 10px', border:'1px solid #d9d9d9', borderRadius:6, fontSize:13}}
                    defaultValue="">
                    <option value="">📌 Vues sauvegardées…</option>
                    {savedViews.map((v,i)=><option key={i} value={v.name}>{v.name}</option>)}
                  </select>
                </div>
              )}
              <button className="btn btn-default btn-sm" onClick={()=>setSaveViewModal(true)}>💾 Sauvegarder la vue</button>
              <button className="btn btn-default btn-sm">⬇ Exporter (CSV / PDF)</button>
            </div>
          </div>

          {/* Contrôles */}
          <div className="section-card" style={{marginBottom:16}}>
            <div style={{display:'flex', gap:16, flexWrap:'wrap', alignItems:'flex-start'}}>
              {/* KPI */}
              <div style={{flex:'0 0 auto', minWidth:220}}>
                <div style={{fontSize:12, color:'#595959', marginBottom:4, fontWeight:500}}>KPI affiché</div>
                <select value={selectedKpi.id} onChange={e=>setSelectedKpi(KPI_LIST.find(k=>k.id===+e.target.value))}
                  style={{width:'100%', padding:'6px 10px', border:'1px solid #d9d9d9', borderRadius:6, fontSize:13}}>
                  {KPI_LIST.map(k=><option key={k.id} value={k.id}>{k.name}</option>)}
                </select>
              </div>

              {/* Période */}
              <div>
                <div style={{fontSize:12, color:'#595959', marginBottom:4, fontWeight:500}}>Période</div>
                <div style={{display:'flex', gap:4}}>
                  {[['3m','3 mois'],['6m','6 mois'],['12m','12 mois'],['ytd','Depuis jan.']].map(([v,l])=>(
                    <button key={v} onClick={()=>setPeriod(v)} style={{
                      padding:'5px 12px', borderRadius:6, cursor:'pointer', fontSize:12,
                      background: period===v ? '#1677ff' : '#fff',
                      color: period===v ? '#fff' : '#595959',
                      border: period===v ? '1px solid #1677ff' : '1px solid #d9d9d9',
                    }}>{l}</button>
                  ))}
                </div>
              </div>

              {/* Clients */}
              <div>
                <div style={{fontSize:12, color:'#595959', marginBottom:4, fontWeight:500}}>Clients affichés</div>
                <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                  {CLIENTS.map(c=>(
                    <span key={c.id}
                      onClick={()=>toggleClient(c.id)}
                      style={{
                        padding:'4px 10px', borderRadius:12, cursor:'pointer', fontSize:12, fontWeight:500,
                        background: activeClients.includes(c.id) ? c.color + '20' : '#f5f5f5',
                        border: `2px solid ${activeClients.includes(c.id) ? c.color : '#d9d9d9'}`,
                        color: activeClients.includes(c.id) ? c.color : '#8c8c8c',
                      }}>
                      {activeClients.includes(c.id) ? '● ' : '○ '}{c.name}
                    </span>
                  ))}
                </div>
              </div>

              {/* Filtres */}
              <div style={{marginLeft:'auto'}}>
                <div style={{fontSize:12, color:'#595959', marginBottom:4, fontWeight:500}}>Filtres d'exclusion</div>
                <button
                  onClick={()=>setShowFilters(!showFilters)}
                  className={`btn btn-${activeFiltersCount > 0 ? 'primary' : 'default'} btn-sm`}>
                  🎛 Filtres {activeFiltersCount > 0 ? `(${activeFiltersCount} actifs)` : ''}
                </button>
              </div>
            </div>

            {/* Panneau filtres */}
            {showFilters && (
              <div style={{marginTop:16, paddingTop:16, borderTop:'1px solid #f0f0f0'}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16}}>
                  <div>
                    <div style={{fontSize:12, fontWeight:600, marginBottom:8, color:'#595959'}}>Exclure des statuts JIRA</div>
                    <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                      {STATUS_SAMPLE.map(s=>(
                        <span key={s} onClick={()=>toggleStatus(s)}
                          className={`badge ${excludeStatuses.includes(s)?'badge-red':'badge-gray'}`}
                          style={{cursor:'pointer', fontSize:12}}>
                          {excludeStatuses.includes(s)?'✕ ':'+ '}{s}
                        </span>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:12, fontWeight:600, marginBottom:8, color:'#595959'}}>Exclure des collaborateurs</div>
                    <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                      {USERS_SAMPLE.map(u=>(
                        <span key={u} onClick={()=>toggleUser(u)}
                          className={`badge ${excludeUsers.includes(u)?'badge-red':'badge-gray'}`}
                          style={{cursor:'pointer', fontSize:12}}>
                          {excludeUsers.includes(u)?'✕ ':'+ '}{u.split(' ')[0]}
                        </span>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:12, fontWeight:600, marginBottom:8, color:'#595959'}}>Exclure des types de tickets</div>
                    <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                      {TYPE_SAMPLE.map(t=>(
                        <span key={t} onClick={()=>toggleType(t)}
                          className={`badge ${excludeTypes.includes(t)?'badge-red':'badge-gray'}`}
                          style={{cursor:'pointer', fontSize:12}}>
                          {excludeTypes.includes(t)?'✕ ':'+ '}{t}
                        </span>
                      ))}
                    </div>
                  </div>
                </div>
                {activeFiltersCount > 0 && (
                  <div style={{marginTop:12, padding:'8px 12px', background:'#fff7e6', border:'1px solid #ffd591', borderRadius:6, fontSize:12, color:'#d46b08'}}>
                    ⚠️ Calcul excluant :
                    {excludeStatuses.length > 0 && <span> statuts [{excludeStatuses.join(', ')}]</span>}
                    {excludeUsers.length > 0 && <span> · collaborateurs [{excludeUsers.join(', ')}]</span>}
                    {excludeTypes.length > 0 && <span> · types [{excludeTypes.join(', ')}]</span>}
                    {' '}
                    <button onClick={()=>{setExcludeStatuses([]);setExcludeUsers([]);setExcludeTypes([]);}}
                      style={{background:'none',border:'none',color:'#1677ff',cursor:'pointer',fontSize:12,marginLeft:8}}>
                      Réinitialiser les filtres
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Graphique */}
          <div className="section-card">
            <div className="section-header">
              <span className="section-header-title">
                📈 {selectedKpi.name} — Évolution sur {period === '6m' ? '6 mois' : period === '3m' ? '3 mois' : period === '12m' ? '12 mois' : 'l\'année'}
              </span>
            </div>
            {noDataClients.length > 0 && (
              <div style={{marginBottom:12, padding:'6px 12px', background:'#fafafa', borderRadius:6, border:'1px solid #f0f0f0', fontSize:12, color:'#8c8c8c'}}>
                ℹ️ Aucune donnée disponible pour : {noDataClients.map(c=>c.name).join(', ')} sur cette période.
              </div>
            )}
            <div style={{height:360, position:'relative'}}>
              <canvas ref={chartCanvasRef}></canvas>
            </div>
          </div>

          {/* Tableau récapitulatif */}
          <div className="section-card">
            <div className="section-header">
              <span className="section-header-title">📋 Tableau récapitulatif — Dernier mois (Jan 2026)</span>
            </div>
            <table className="data-table">
              <thead>
                <tr>
                  <th>Client</th>
                  <th style={{textAlign:'right'}}>Oct 2025</th>
                  <th style={{textAlign:'right'}}>Nov 2025</th>
                  <th style={{textAlign:'right'}}>Déc 2025</th>
                  <th style={{textAlign:'right'}}>Jan 2026</th>
                  <th style={{textAlign:'right'}}>Tendance</th>
                </tr>
              </thead>
              <tbody>
                {CLIENTS.filter(c=>activeClients.includes(c.id)).map(c => {
                  const d = DATA[selectedKpi.id][c.id];
                  if (!d || d.every(v=>v===null)) return (
                    <tr key={c.id} style={{opacity:0.5}}>
                      <td style={{fontWeight:500, color:c.color}}>{c.name}</td>
                      <td colSpan={5} style={{textAlign:'center', color:'#8c8c8c', fontSize:12}}>Données non disponibles</td>
                    </tr>
                  );
                  const last = d[d.length-1];
                  const prev = d[d.length-2];
                  const trend = last > prev ? '↗' : last < prev ? '↘' : '→';
                  const trendColor = selectedKpi.higherIsBad ? (last > prev ? '#ff4d4f' : last < prev ? '#52c41a' : '#8c8c8c') : (last > prev ? '#52c41a' : last < prev ? '#ff4d4f' : '#8c8c8c');
                  return (
                    <tr key={c.id}>
                      <td><span style={{display:'inline-block', width:10, height:10, borderRadius:'50%', background:c.color, marginRight:8}}></span><strong>{c.name}</strong></td>
                      {[2,3,4,5].map(i=>(
                        <td key={i} style={{textAlign:'right', fontSize:13}}>{d[i] !== null ? d[i] + selectedKpi.unit : '—'}</td>
                      ))}
                      <td style={{textAlign:'right', fontWeight:700, color:trendColor, fontSize:16}}>{trend}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Save view modal */}
      {saveViewModal && (
        <div className="modal-overlay" onClick={()=>setSaveViewModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{width:420}}>
            <div className="modal-header">
              <span>💾 Sauvegarder la vue</span>
              <button className="modal-close" onClick={()=>setSaveViewModal(false)}>✕</button>
            </div>
            <div style={{padding:'20px 24px'}}>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:12, color:'#595959', display:'block', marginBottom:4}}>Nom de la vue *</label>
                <input id="viewName" style={{width:'100%', padding:'6px 10px', border:'1px solid #d9d9d9', borderRadius:6, fontSize:13}}
                  defaultValue={`${selectedKpi.name} — ${CLIENTS.filter(c=>activeClients.includes(c.id)).map(c=>c.name).join(', ')}`} />
              </div>
              <div style={{fontSize:12, color:'#595959'}}>
                <strong>Paramètres sauvegardés :</strong>
                <ul style={{marginTop:6, paddingLeft:18, lineHeight:1.8}}>
                  <li>KPI : {selectedKpi.name}</li>
                  <li>Clients : {CLIENTS.filter(c=>activeClients.includes(c.id)).map(c=>c.name).join(', ')}</li>
                  <li>Période : {period}</li>
                  {activeFiltersCount > 0 && <li>Filtres d'exclusion : {activeFiltersCount} actifs</li>}
                </ul>
              </div>
            </div>
            <div style={{padding:'12px 24px', borderTop:'1px solid #f0f0f0', display:'flex', justifyContent:'flex-end', gap:8}}>
              <button className="btn btn-default" onClick={()=>setSaveViewModal(false)}>Annuler</button>
              <button className="btn btn-primary" onClick={()=>{
                setSavedViews(prev=>[...prev,{name:document.getElementById('viewName').value, kpi:selectedKpi.name, clients:CLIENTS.filter(c=>activeClients.includes(c.id)).map(c=>c.name).join(', ')}]);
                setSaveViewModal(false);
              }}>Sauvegarder</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<CrossClientPage />, document.getElementById('root'));
</script>
</body>
</html>
