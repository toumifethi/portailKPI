<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Portail KPI</title>
  <link rel="stylesheet" href="_layout.css">
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── DONNÉES MOCK ────────────────────────────────────────────────────────────
const MOCK_CLIENTS = [
  {
    id: 'A', name: 'Client A', project: 'PROJET ALPHA', color: '#1677ff',
    kpis: [
      { title: 'Respect des charges', value: '-4,2', numeric: -4.2, unit: '%', trend: +1.3, rag: 'green', tickets: 23, excluded: 3 },
      { title: 'Qualité', value: '12,3', numeric: 12.3, unit: '%', trend: -0.8, rag: 'green', tickets: 18, excluded: 1 },
    ]
  },
  {
    id: 'B', name: 'Client B', project: 'PROJET SUPPORT', color: '#722ed1',
    kpis: [
      { title: 'Respect des charges', value: '+18,5', numeric: 18.5, unit: '%', trend: -3.2, rag: 'red', tickets: 11, excluded: 2 },
      { title: 'Qualité', value: '34,1', numeric: 34.1, unit: '%', trend: +5.0, rag: 'red', tickets: 9, excluded: 0 },
    ]
  }
];

const CHART_DATA = {
  labels: ['Août', 'Sep', 'Oct', 'Nov', 'Déc', 'Jan'],
  datasets: [
    { label: 'Client A', data: [7.2, 8.5, 5.2, 3.8, 3.3, 4.6], borderColor: '#1677ff', backgroundColor: 'rgba(22,119,255,0.08)', tension: 0.4, fill: true, pointRadius: 4, pointHoverRadius: 6 },
    { label: 'Client B', data: [20.1, 22.8, 19.5, 17.8, 15.2, 18.5], borderColor: '#722ed1', backgroundColor: 'rgba(114,46,209,0.06)', tension: 0.4, fill: true, pointRadius: 4, pointHoverRadius: 6 },
  ]
};

const RAG_COLORS = { green: '#52c41a', orange: '#fa8c16', red: '#ff4d4f', gray: '#8c8c8c' };
const PERIODS = ['Jan 2025', 'Déc 2024', 'Nov 2024', 'Oct 2024'];

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function Sidebar({ active }) {
  return (
    <div className="sidebar">
      <div className="sidebar-logo">
        <span className="logo-icon">📊</span>
        <div><div className="logo-text">Portail KPI</div><div className="logo-sub">DECADE</div></div>
      </div>

      <div className="nav-section">Navigation</div>
      <a href="02-dashboard.html" className={`nav-item ${active==='dashboard' ? 'active' : ''}`}>
        <span className="nav-icon">🏠</span> Tableau de bord
      </a>
      <a href="02-dashboard.html" className={`nav-item ${active==='me' ? 'active' : ''}`}>
        <span className="nav-icon">👤</span> Mes KPI
      </a>
      <a href="03-equipe-heatmap.html" className={`nav-item ${active==='team' ? 'active' : ''}`}>
        <span className="nav-icon">👥</span> Mon équipe
      </a>
      <a href="#" className="nav-item">
        <span className="nav-icon">🏢</span> Vue clients
      </a>

      <div className="nav-section">Administration</div>
      <a href="04-admin-sante.html" className={`nav-item ${active==='health' ? 'active' : ''}`}>
        <span className="nav-icon">🩺</span> Santé système
      </a>
      <a href="05-admin-imports.html" className={`nav-item ${active==='imports' ? 'active' : ''}`}>
        <span className="nav-icon">📥</span> Imports
      </a>
      <a href="06-admin-utilisateurs.html" className="nav-item">
        <span className="nav-icon">🔑</span> Utilisateurs
      </a>
      <a href="07-admin-client-config.html" className="nav-item">
        <span className="nav-icon">⚙️</span> Config. Clients
      </a>
      <a href="08-admin-kpi-config.html" className="nav-item">
        <span className="nav-icon">📐</span> Config. KPI
      </a>

      <div className="sidebar-footer">
        <div className="user-name">Jean DUPONT</div>
        <div>Développeur</div>
      </div>
    </div>
  );
}

// ─── HEADER ──────────────────────────────────────────────────────────────────
function Header({ breadcrumb }) {
  return (
    <div className="header">
      <div className="breadcrumb">
        {breadcrumb.map((item, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span className="sep">/</span>}
            {i < breadcrumb.length - 1
              ? <a href={item.href || '#'}>{item.label}</a>
              : <span className="current">{item.label}</span>
            }
          </React.Fragment>
        ))}
      </div>
      <div className="header-right">
        <span className="sync-info">⏱ Données au 15/01 – 02h14</span>
        <button className="bell-btn">
          🔔 <span className="bell-badge">2</span>
        </button>
        <div className="user-avatar">JD</div>
        <span className="user-name-header">Jean DUPONT ▾</span>
      </div>
    </div>
  );
}

// ─── KPI CARD ────────────────────────────────────────────────────────────────
function KpiCard({ kpi, onClick }) {
  const color = RAG_COLORS[kpi.rag];
  const trendUp = kpi.trend > 0;
  return (
    <div className="kpi-card" style={{ borderTopColor: color }} onClick={onClick}>
      <div className="kpi-card-title">{kpi.title}</div>
      <div className="kpi-card-value" style={{ color }}>{kpi.value}{kpi.unit}</div>
      <div className="kpi-card-trend" style={{ color }}>
        <span>{trendUp ? '▲' : '▼'}</span>
        <span>{trendUp ? '+' : ''}{kpi.trend}{kpi.unit} vs mois préc.</span>
      </div>
      <div className="kpi-card-meta">
        📋 {kpi.tickets} tickets · {kpi.excluded} exclus
      </div>
    </div>
  );
}

// ─── EVOLUTION CHART ─────────────────────────────────────────────────────────
function EvolutionChart() {
  const canvasRef = React.useRef(null);
  const chartRef  = React.useRef(null);

  React.useEffect(() => {
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: CHART_DATA,
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { mode: 'index', intersect: false }
        },
        scales: {
          y: {
            grid: { color: '#f5f5f5' },
            ticks: { callback: v => v + '%', font: { size: 11 } }
          },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, []);

  return (
    <div className="chart-card">
      <div className="chart-card-header">
        <span className="chart-card-title">📈 Évolution mensuelle — Respect des charges</span>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#1677ff'}}/>Client A</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#722ed1'}}/>Client B</div>
        </div>
      </div>
      <div style={{ height: 220 }}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

// ─── PERIOD SELECTOR ─────────────────────────────────────────────────────────
function PeriodBar({ period, setPeriod }) {
  const [type, setType] = React.useState('Mois');
  return (
    <div className="period-bar">
      <div className="period-nav">
        <button className="period-type-btn active">Mois</button>
        <button className="period-type-btn">Trimestre</button>
        <button className="period-type-btn">Année</button>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <button className="period-btn">◀</button>
        <span className="period-label">{period}</span>
        <button className="period-btn">▶</button>
      </div>
      <div className="period-actions">
        <button className="btn btn-default btn-sm">↓ Exporter ▾</button>
      </div>
    </div>
  );
}

// ─── DRILL-DOWN MODAL ────────────────────────────────────────────────────────
function DrillDownModal({ kpi, client, onClose }) {
  const tickets = [
    { key: 'ALPH-123', title: 'Module connexion', est: '8h', spent: '7h', ecart: '-12%', rag: 'green' },
    { key: 'ALPH-124', title: 'Token refresh', est: '4h', spent: '4,2h', ecart: '+5%', rag: 'green' },
    { key: 'ALPH-125', title: 'Page login responsive', est: '6h', spent: '8,7h', ecart: '+45%', rag: 'red' },
    { key: 'ALPH-126', title: 'SSO Azure AD', est: '12h', spent: '11h', ecart: '-8%', rag: 'green' },
    { key: 'ALPH-127', title: 'Tests unitaires auth', est: '5h', spent: '5,5h', ecart: '+10%', rag: 'orange' },
  ];
  const excluded = [
    { key: 'ALPH-130', title: 'Fix CSS navigation', reason: 'Estimation manquante' },
    { key: 'ALPH-131', title: 'Retour recette login', reason: 'Type exclu (Retour Recette)' },
    { key: 'ALPH-132', title: 'Fix typo accueil', reason: 'Estimation manquante' },
  ];
  const [showExcluded, setShowExcluded] = React.useState(false);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{width:700}} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">🔍 {kpi.title} — Jean DUPONT · {client.name} · Jan 2025</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{maxHeight:'70vh', overflowY:'auto'}}>
          <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)', marginBottom:16}}>
            <div className="stat-card">
              <div className="stat-value" style={{color:RAG_COLORS[kpi.rag]}}>{kpi.value}{kpi.unit}</div>
              <div className="stat-label">Valeur KPI</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{kpi.tickets}</div>
              <div className="stat-label">Tickets pris en compte</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{color:'#fa8c16'}}>{kpi.excluded}</div>
              <div className="stat-label">Tickets exclus</div>
            </div>
          </div>

          <div style={{marginBottom:8, fontWeight:600, fontSize:13}}>Tickets inclus dans le calcul ({kpi.tickets})</div>
          <table className="data-table" style={{marginBottom:16}}>
            <thead><tr>
              <th>Ticket</th><th>Titre</th><th>Estimé</th><th>Consommé</th><th>Écart</th>
            </tr></thead>
            <tbody>
              {tickets.map(t => (
                <tr key={t.key}>
                  <td><a href="#" style={{color:'#1677ff'}}>{t.key} ↗</a></td>
                  <td>{t.title}</td>
                  <td>{t.est}</td>
                  <td>{t.spent}</td>
                  <td><span className={`badge badge-${t.rag === 'green' ? 'green' : t.rag === 'orange' ? 'orange' : 'red'}`}>{t.ecart}</span></td>
                </tr>
              ))}
            </tbody>
          </table>

          <div style={{marginBottom:8}}>
            <button className="btn btn-default btn-sm" onClick={() => setShowExcluded(!showExcluded)}>
              {showExcluded ? '▲' : '▼'} Tickets exclus du calcul ({kpi.excluded})
            </button>
          </div>
          {showExcluded && (
            <table className="data-table">
              <thead><tr><th>Ticket</th><th>Titre</th><th>Raison d'exclusion</th></tr></thead>
              <tbody>
                {excluded.map(t => (
                  <tr key={t.key}>
                    <td><a href="#" style={{color:'#1677ff'}}>{t.key} ↗</a></td>
                    <td>{t.title}</td>
                    <td><span className="badge badge-gray">{t.reason}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-default btn-sm">↓ Exporter CSV</button>
          <button className="btn btn-default btn-sm">↓ Exporter Excel</button>
          <button className="btn btn-default btn-sm">↓ Exporter PDF</button>
          <button className="btn btn-default" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </div>
  );
}

// ─── PAGE PRINCIPALE ──────────────────────────────────────────────────────────
function Dashboard() {
  const [period, setPeriod] = React.useState('Janvier 2025');
  const [modal, setModal]   = React.useState(null); // { kpi, client }

  return (
    <div style={{display:'flex'}}>
      <Sidebar active="me" />
      <div style={{flex:1}}>
        <Header breadcrumb={[{label:'Dashboard', href:'02-dashboard.html'}, {label:'Mes KPI'}]} />
        <div className="content">

          {/* Bandeau santé Admin */}
          <div className="alert-banner warning" style={{marginBottom:16}}>
            <span className="alert-icon">⚙️</span>
            <div><strong>Santé système :</strong> ✅ 3 clients OK · ⚠️ 1 avertissement (Client B – 14 tickets sans estimation) · ❌ 0 erreur critique</div>
            <button className="alert-action" onClick={() => window.location.href='04-admin-sante.html'}>Voir le détail →</button>
          </div>

          <div className="page-title">👤 Jean DUPONT — Mes KPI</div>
          <div className="page-subtitle">Développeur · Données au 15 janvier 2025</div>

          <PeriodBar period={period} setPeriod={setPeriod} />

          {MOCK_CLIENTS.map(client => (
            <div key={client.id} style={{marginBottom:28}}>
              <div className="kpi-section-title">
                <span className="dot" style={{background: client.color}} />
                {client.name} — {client.project}
              </div>
              <div className="kpi-grid">
                {client.kpis.map((kpi, i) => (
                  <KpiCard
                    key={i}
                    kpi={kpi}
                    onClick={() => setModal({ kpi, client })}
                  />
                ))}
              </div>
            </div>
          ))}

          <EvolutionChart />

          <div style={{textAlign:'center', padding:'8px 0', fontSize:12, color:'#bfbfbf'}}>
            💡 Cliquez sur une carte KPI pour voir le détail des tickets
          </div>
        </div>
      </div>

      {modal && (
        <DrillDownModal
          kpi={modal.kpi}
          client={modal.client}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
