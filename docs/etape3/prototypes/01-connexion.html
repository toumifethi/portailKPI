<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Portail KPI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css">
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0050b3 0%, #1677ff 50%, #40a9ff 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: Inter, -apple-system, sans-serif;
    }
    .login-card {
      width: 420px; border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .logo-area {
      background: linear-gradient(135deg, #1677ff, #0050b3);
      padding: 32px 24px; text-align: center; color: white;
    }
    .logo-icon { font-size: 56px; line-height: 1; display: block; margin-bottom: 12px; }
    .logo-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .card-body { background: white; padding: 32px 28px; }
    .ms-btn {
      width: 100%; height: 48px; border-radius: 8px;
      border: 2px solid #1677ff; background: white; color: #1677ff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
    }
    .ms-btn:hover { background: #1677ff; color: white; }
    .ms-btn .ms-icon { font-size: 22px; }
    .footer-note {
      font-size: 12px; color: #8c8c8c; text-align: center;
      line-height: 1.6; margin-top: 20px;
    }
    .divider { border-top: 1px solid #f0f0f0; margin: 24px 0; }
    .section-title { font-size: 14px; color: #595959; font-weight: 500; text-align: center; margin-bottom: 20px; }
    .error-banner {
      background: #fff2f0; border: 1px solid #ffccc7; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #cf1322;
      display: flex; gap: 8px; align-items: flex-start;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function LoginPage() {
      const [showError, setShowError] = React.useState(false);

      const handleLogin = () => {
        // Simuler une connexion réussie → redirection vers dashboard
        window.location.href = '02-dashboard.html';
      };

      const handleErrorDemo = () => setShowError(true);

      return (
        <div className="login-card">
          <div className="logo-area">
            <span className="logo-icon">📊</span>
            <div className="logo-title">Portail KPI</div>
            <div className="logo-subtitle">Productivité & Performance — DECADE</div>
          </div>
          <div className="card-body">
            <p className="section-title">Connectez-vous avec votre compte professionnel</p>

            {showError && (
              <div className="error-banner">
                <span>⚠️</span>
                <div>
                  <strong>Compte non autorisé</strong><br/>
                  Votre compte n'est pas enregistré dans l'application.<br/>
                  Contactez votre administrateur DECADE.
                </div>
              </div>
            )}

            <button className="ms-btn" onClick={handleLogin}>
              <span className="ms-icon">⊞</span>
              Se connecter avec Microsoft 365
            </button>

            <div className="divider"/>

            <p className="footer-note">
              Accès réservé aux collaborateurs DECADE.<br/>
              En cas de problème de connexion, contactez votre administrateur<br/>
              ou écrivez à <strong>support@decade.fr</strong>
            </p>

            <div style={{marginTop: 16, textAlign: 'center'}}>
              <button
                onClick={handleErrorDemo}
                style={{fontSize: 11, color: '#bfbfbf', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline'}}
              >
                [Démo] Simuler un compte non autorisé
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<LoginPage />, document.getElementById('root'));
  </script>
</body>
</html>
