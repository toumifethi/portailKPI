# Stack de production autonome pour Oracle Cloud Free Tier (1GB RAM)
# Commande : docker-compose -f docker-compose.prod.yml up -d --build

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-StrongRootP@ss2024}
      MYSQL_DATABASE: portailkpi
      MYSQL_USER: portailkpi
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ProdP@ss2024}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --max-connections=50
      --key-buffer-size=16M
      --tmp-table-size=16M
      --max-heap-table-size=16M
      --table-open-cache=64
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "portailkpi", "-pProdP@ss2024"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 384m

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 48m

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      AUTH_MODE: ${AUTH_MODE:-azure}
      DATABASE_URL: mysql://portailkpi:${MYSQL_PASSWORD:-ProdP@ss2024}@mysql:3306/portailkpi
      REDIS_URL: redis://redis:6379
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost}
      SQL_KPI_TIMEOUT_MS: "30000"
      KPI_RECALC_CONCURRENCY: "1"
      JIRA_PAGE_SIZE: "100"
      PORT: "3000"
    command: ["node", "--max-old-space-size=256", "dist/index.js"]
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    mem_limit: 320m

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_MODE: ${AUTH_MODE:-azure}
        VITE_AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
        VITE_AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m

volumes:
  mysql_data:
  redis_data:
